<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>JEE Main 2026 Predictor</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>JEE Main 2026 Predictor</h1>

    <button id="themeBtn">🌙 Dark Mode</button>
  </header>

  <main>

    <section class="hero">
      <h2>Predict Your Rank, Percentile & Colleges</h2>

      <p>
        Enter your JEE Main marks and get prediction instantly.
      </p>
    </section>

    <section class="predictor-card">

      <label>Enter Marks (0 - 300)</label>

      <input
        type="number"
        id="marks"
        placeholder="Enter marks"
      >

      <label>Select Category</label>

      <select id="category">
        <option>General</option>
        <option>OBC-NCL</option>
        <option>SC</option>
        <option>ST</option>
        <option>EWS</option>
      </select>

      <button class="predict-btn" onclick="predict()">
        Predict Now
      </button>

    </section>

    <section id="result"></section>

  </main>

  <footer>
    Built using HTML, CSS, JavaScript & C
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
